{% extends 'base.html' %}
{% block title %}Add Transaction{% endblock %}
{% block content %}
<h2>Edit Transaction</h2>
<form action="{{url_for('update', id=transaction['id'])}}"   method="post" enctype="multipart/form-data">
    <div class="mb-3">
        <label>Date</label>
        <input type="date" name="date" class="form-control" required value="{{transaction['date']}}">
    </div>
    <div class="mb-3">
        <label>Type</label>
        <select name="type" class="form-control" required>
            <option value="Income"{% if transaction ['type'] =='Income' %} selected {% endif %}>Income</option>
            <option value="Expense" {%  if transaction ['type']=='Expense' %} selected {% endif %}>Expense</option>
        </select>
    </div>
    <div class="mb-3">
        <label>Category</label> 
        <input type="text" name="category" class="form-control" required value="{{transaction['category']}}">
    </div>
    <div class="mb-3">
        <label>Amount</label>
        <input type="number" step="0.01" name="amount" class="form-control" required value ="{{ transaction['amount']}}">
    </div>
    <div class="mb-3">
        <label>Description</label>
        <textarea name="description" class="form-control">{{ transaction['description']}}</textarea>
        {% if error %}
        <p style="color:red">{{error}}</p>
        {% endif %}
    </div>

     <div class="mb-3">
        <label class="form-label">Current Attachment</label><br>
        {% if transaction['attachment'] %}
            <a href ="{{ url_for('static',filename='uploads/'+transaction['attachment'])}}" target="_blank">View Current</a>
            <a href="{{ url_for('confirm_delete', id=transaction['id'], target='attachment')}}" class="btn btn-sm btn-danger">Delete</a>
        {% else %}
            No attachment
        {% endif %}
     </div>
     <div>
        <label for="attachment" class="form-label">Change Attachment (optional)</label>
        <input type="file" name="attachment" id='attachment' class="form-control" >
    </div>

    <button type="submit" class="btn btn-primary">Update</button>
</form>
<a href="{{ url_for('dashboard')}}" class="btn btn-secondary mt-2">Cancel</a>
{% endblock %}
