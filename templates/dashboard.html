{% extends 'base.html' %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h2>Dashboard</h2>
<a href="{{ url_for('add') }}" class="btn btn-success mb-3">Add Transaction</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Category</th>
            <th>Amount</th>
            <th>Description</th>
            <th>Action</th>
        </tr>

    </thead>
    <tbody>
        {% for t in transactions %}
        <tr>
            <td>{{ t[1] }}</td>
            <td>{{ t[2] }}</td>
            <td>{{ t[3] }}</td>
            <td>{{ t[4] }}</td>
            <td>{{ t[5] }}</td>
            <td class="d-flex gap-2">
                <form action="{{ url_for('amend',id=t[0])}}" method="get">
                    <button type="submit">Edit</button>
                </form>
                <form action="{{ url_for('confirm_delete',id=t[0])}}" method="get">
                    <button type="submit">Delete</button>
                </form>

            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
